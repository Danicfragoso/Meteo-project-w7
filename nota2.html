<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2nd try</title>
    <style>
        body {
            background-color: aliceblue;
        }
        .app {
            background-color: white;
    margin: 60px auto;
    max-width: 800px;
    padding: 50px;
    border-radius: 20px;
    box-shadow: 0 30px 50px rgba(65, 50, 100, 0.08)
        }
        main {
    padding: 30px 0;
}
.weather-data {
    display: flex;
    justify-content: space-between;
     align-items: flex-start;
      width: 70%;
}
.weather-city {
    font-size: 30px;
    line-height: 20px;
    margin: 0;
}
.weather-info {
    font-size: 15px;
}
.weather-temperature {
    font-weight: bold;
    margin-top: 40px;
   
}
.weather-icon {
    font-size: 20px;
}

.weather-value {
    font-size: 28px;
}

footer {
    text-align: center;
font-size: 12px;
}
    </style>
</head>
<body>
    <div class="app">
        <header> Formulário FAZER</header>
        <main> 
                <div class="weather-data">
                    <div class="weather-city">
                        <h1>Lisbon</h1>
                        <div class="weather-info">
                            <p>
                                Thursday 15:47, windy
                                <br />
                                Humidity: 47%, Wind: 24km/h
                            </p>
                        </div>
                    </div>
                
                    <div class="weather-temperature">
                        <span class="weather-icon">🌤️</span>
                        <span class="weather-value">20°</span>
                    </div>
                </div>
                
        </main>
        <footer> Coded by Daniela Correia Fragoso </footer>
    </div>
    
</body>
</html>
