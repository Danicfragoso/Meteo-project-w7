<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W7 Project</title>
    <link rel="stylesheet" href="src/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>
<body>
    <div class="app">
    <header>
        <form class="search-form"> 
            <input type="search" placeholder="Enter a city" required class="form-input"/>
            <input type="submit" value="Search" class="form-button"/>
        </form> 
    </header>
    <main>
            <div class="weather-data">
                <div class="weather-city">
                    <h1>Lisbon</h1>
                    <div class="weather-info">
                        <p>
                            Thursday 15:47, windy
                            <br />
                            Humidity: 47%, Wind: 24km/h
                        </p>
                    </div>
                </div>
    
                <div class="weather-temperature">
                    <span class="weather-icon">🌤️</span>
                    <span class="weather-value">20°</span>
                </div>
            </div>
    
    </main>

    <footer> This project was coded by 
        <a href="https://github.com/Danicfragoso" target="_blank"> Daniela Correia Fragoso</a> hosted on <a href="https://github.com/Danicfragoso/Meteo-project-w7" target="_blank">Github </a> and <a href="https://meteorologiaw7project.netlify.app" target="_blank"> Netlify</a>
    </footer>
    </div>
</body>
</html>
